{% extends "base.html" %}
{% block title %}Login - SmartBudget{% endblock %}
{% block page_title %}Login{% endblock %}
{% block page_subtitle %}Access your daily finance workspace{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button class="btn" type="submit">Login</button>
            <a class="btn btn-secondary" href="{% url 'signup' %}">Create account</a>
        </div>
    </form>
</div>
{% endblock %}
